<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>WickedAI Labs</title>
    <script>
      // GitHub Pages SPA redirect: encode the path into a query param and redirect to index.html
      var path = window.location.pathname;
      var search = window.location.search;
      var hash = window.location.hash;
      var redirect = '/?p=' + encodeURIComponent(path.slice(1)) +
        (search ? '&q=' + encodeURIComponent(search.slice(1)) : '') +
        hash;
      window.location.replace(redirect);
    </script>
  </head>
  <body></body>
</html>
